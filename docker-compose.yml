services:
  postgres:
    image: postgres:16-alpine
    container_name: intern_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intern_tracker
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .                          # ← monorepo kökü
      dockerfile: apps/api/Dockerfile     # ← dockerfile path'i kökten
    container_name: intern_tracker_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: intern_tracker
      JWT_SECRET: super-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - '3001:3001'
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: .                          # ← monorepo kökü
      dockerfile: apps/web/Dockerfile     # ← dockerfile path'i kökten
    container_name: intern_tracker_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  uploads:
